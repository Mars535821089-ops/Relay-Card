name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (shellcheck + shfmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -fsSL https://webi.sh/shfmt | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: shellcheck
        run: |
          shellcheck -x src/lib/*.sh src/adapters/claude-code/*.sh scripts/*.sh bin/*

      - name: shfmt check
        run: |
          shfmt -d -i 2 -ci src/lib/*.sh src/adapters/claude-code/*.sh scripts/*.sh bin/*

  test-unit:
    name: Unit tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Relay Card (dry-run)
        run: bash scripts/install.sh --dry-run

      - name: Run tests
        run: |
          # bats test
          bats tests/unit/

  test-integration:
    name: Integration tests
    runs-on: macos-latest  # macOS bash 3.2 兼容测试
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run integration tests
        env:
          # 隔离到临时目录, 不污染 runner home
          RELAY_HOME: ${{ runner.temp }}/relay-test/hooks
          RELAY_DIR: ${{ runner.temp }}/relay-test/cards
          BIN_DIR: ${{ runner.temp }}/relay-test/bin
        run: |
          bash tests/integration/run-all.sh

  matrix:
    name: Multi-platform test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Self-check
        env:
          RELAY_HOME: ${{ runner.temp }}/relay-test/hooks
          RELAY_DIR: ${{ runner.temp }}/relay-test/cards
        run: |
          bash src/lib/relay-card-sanitize.sh --test
          bash src/lib/relay-card-write.sh --auto || true
          ls -la "$RELAY_DIR"